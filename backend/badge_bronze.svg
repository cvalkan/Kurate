<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 392" width="640" height="392">
  <defs>
    <filter id="cardShadow" x="-4%" y="-3%" width="108%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="badgeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <!-- Bronze face — warm copper-brown specular -->
    <radialGradient id="bronzeSheen" cx="0.35" cy="0.3" r="0.7" fx="0.3" fy="0.25">
      <stop offset="0%" stop-color="#f5dcc0"/>
      <stop offset="15%" stop-color="#e8c09a"/>
      <stop offset="35%" stop-color="#cd7f32"/>
      <stop offset="55%" stop-color="#b06c28"/>
      <stop offset="75%" stop-color="#9a5e22"/>
      <stop offset="100%" stop-color="#8b5520"/>
    </radialGradient>
    <!-- Rim — beveled bronze edge -->
    <linearGradient id="bronzeRim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dea06a"/>
      <stop offset="20%" stop-color="#8b5520"/>
      <stop offset="40%" stop-color="#cd7f32"/>
      <stop offset="60%" stop-color="#7a4a1a"/>
      <stop offset="80%" stop-color="#c47a30"/>
      <stop offset="100%" stop-color="#916028"/>
    </linearGradient>
    <!-- Inner ring -->
    <linearGradient id="bronzeInner" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#cd7f32" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#e8c09a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5520" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Specular highlight overlay -->
    <radialGradient id="bronzeHighlight" cx="0.3" cy="0.25" r="0.35" fx="0.28" fy="0.22">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="headerClip">
      <rect x="0" y="0" width="640" height="52" rx="0" ry="0"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect x="0" y="0" width="640" height="392" rx="0" ry="0" fill="#ffffff"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="640" height="52" fill="#f0f4f8"/>
  <rect x="0" y="48" width="640" height="16" fill="#f0f4f8"/>
  <line x1="0" y1="64" x2="640" y2="64" stroke="#dde3ea" stroke-width="1"/>

  <!-- Header text -->
  <text x="20" y="45" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#6b6b6b">
    <tspan>Week 11, 2026</tspan>
    <tspan fill="#bbb"> · </tspan>
    <tspan>Robotics Preprints</tspan>
    <tspan fill="#bbb"> · </tspan>
    <tspan>arXiv (cs.RO)</tspan>
  </text>

  <!-- Kurate.org logo -->
  <text x="468" y="48" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" letter-spacing="-0.3"><tspan font-weight="800" fill="#4285F4">Ku</tspan><tspan font-weight="800" fill="#1a1a1a">rate</tspan><tspan font-weight="400" fill="#4285F4" font-size="25">.org</tspan></text>

  <!-- Bronze coin -->
  <g filter="url(#badgeShadow)">
    <circle cx="64" cy="124" r="33" fill="url(#bronzeRim)"/>
    <circle cx="64" cy="124" r="30" fill="url(#bronzeSheen)"/>
    <circle cx="64" cy="124" r="30" fill="url(#bronzeHighlight)"/>
    <circle cx="64" cy="124" r="25" fill="none" stroke="url(#bronzeInner)" stroke-width="1.5"/>
    <path d="M 42 109 A 27 27 0 0 1 80 105" fill="none" stroke="white" stroke-width="1.8" opacity="0.35"/>
    <path d="M 48 140 A 22 22 0 0 0 80 140" fill="none" stroke="#e8c09a" stroke-width="0.8" opacity="0.2"/>
    <text x="64" y="125" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="23" font-weight="800" fill="#5a3a10">#3</text>
  </g>

  <!-- BRONZE label -->
  <text x="114" y="100" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#b06c28" letter-spacing="2">BRONZE</text>

  <!-- Paper title -->
  <text font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1a1a1a">
    <tspan x="114" y="124">Data Analogies Enable Efficient</tspan>
    <tspan x="114" y="152">Cross-Embodiment Transfer</tspan>
  </text>

  <!-- Authors -->
  <text x="114" y="178" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#6b7280">Jonathan Yang, Chelsea Finn, Dorsa Sadigh</text>

  <!-- Publication date -->
  <text x="114" y="201" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6b7280">Published March 8, 2026 on arXiv.org</text>

  <!-- arXiv categories -->
  <text x="114" y="219" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6b7280">cs.RO · cs.AI · cs.LG</text>

  <!-- Stat boxes -->
  <rect x="20" y="240" width="184" height="66" rx="10" ry="10" fill="#f0f4f8" stroke="#dde3ea" stroke-width="1"/>
  <text x="124" y="264" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#4285F4">Top 3 of 264</text>
  <text x="124" y="288" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6b7280">Papers</text>

  <rect x="228" y="240" width="184" height="66" rx="10" ry="10" fill="#f0f4f8" stroke="#dde3ea" stroke-width="1"/>
  <text x="320" y="264" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#1a1a1a">1445</text>
  <text x="320" y="288" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6b7280">Elo Score</text>

  <rect x="424" y="240" width="184" height="66" rx="10" ry="10" fill="#f0f4f8" stroke="#dde3ea" stroke-width="1"/>
  <text x="516" y="264" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#34A853">79.5%</text>
  <text x="516" y="288" text-anchor="middle" dominant-baseline="central" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6b7280">Win Rate</text>

  <!-- Separator -->
  <line x1="20" y1="330" x2="620" y2="330" stroke="#dde3ea" stroke-width="1"/>

  <!-- Footer -->
  <text x="20" y="358" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12.5" fill="#6b7280">Ranked by scientific impact (novelty, rigor, significance, clarity) via AI pairwise tournament</text>

</svg>
